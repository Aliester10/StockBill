<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOA Generator</title>
  <meta name="description" content="Aplikasi pembuat Statement of Account dan monitoring stok barang.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CDN Libraries (client-side export) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════
   CSS – identik dengan src/index.css
═══════════════════════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --sidebar-bg: #1A1F36;
      --sidebar-active: linear-gradient(90deg, #4F46E5, #3B82F6);
      --sidebar-text: #94A3B8;
      --sidebar-text-active: #FFFFFF;
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --border: #E2E8F0;
      --border-hover: #CBD5E1;
      --text: #334155;
      --text-heading: #0F172A;
      --text-sub: #64748B;
      --accent: #3B82F6;
      --dark-red: #E11D48;
      --success: #10B981;
      --dark-blue: #1E293B;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, .05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, .05), 0 2px 4px -1px rgba(0, 0, 0, .03);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
      width: 100%
    }

    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      color: #fff;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
      transition: width .3s ease;
      overflow: hidden;
      white-space: nowrap
    }

    .sidebar-closed .sidebar {
      width: 72px
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.02em
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 16px;
      margin-top: 12px;
      flex: 1
    }

    .sidebar-tab {
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: none;
      color: var(--sidebar-text);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all .2s ease;
      text-align: left;
      width: 100%
    }

    .sidebar-tab:hover {
      color: var(--sidebar-text-active);
      background: rgba(255, 255, 255, .05)
    }

    .sidebar-tab.active {
      background: var(--sidebar-active);
      color: var(--sidebar-text-active);
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(79, 70, 229, .3)
    }

    .sidebar-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 24px
    }

    .sidebar-label {
      transition: opacity .2s ease
    }

    .sidebar-closed .sidebar-brand {
      padding: 24px 0;
      justify-content: center
    }

    .sidebar-closed .sidebar-nav {
      padding: 0 12px
    }

    .sidebar-closed .sidebar-tab {
      padding: 12px;
      justify-content: center
    }

    .sidebar-closed .sidebar-label {
      opacity: 0;
      pointer-events: none;
      display: none
    }

    .sidebar-graphic {
      padding: 24px;
      transition: opacity .2s ease
    }

    .sidebar-closed .sidebar-graphic {
      opacity: 0;
      pointer-events: none
    }

    .sidebar-graphic-inner {
      position: relative;
      background: linear-gradient(135deg, rgba(79, 70, 229, .1), rgba(59, 130, 246, .2));
      border-radius: 16px;
      padding: 32px 20px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, .05)
    }

    .sg-icon {
      position: relative;
      z-index: 2;
      color: #818CF8;
      background: rgba(255, 255, 255, .1);
      padding: 12px;
      border-radius: 12px;
      backdrop-filter: blur(4px)
    }

    .sg-circle {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(79, 70, 229, .4), rgba(59, 130, 246, .1))
    }

    .sg-circle-1 {
      width: 100px;
      height: 100px;
      top: -20px;
      right: -20px
    }

    .sg-circle-2 {
      width: 60px;
      height: 60px;
      bottom: -10px;
      left: -10px
    }

    .main-content-wrapper {
      flex: 1;
      margin-left: 260px;
      display: flex;
      flex-direction: column;
      min-width: 0;
      transition: margin-left .3s ease
    }

    .sidebar-closed .main-content-wrapper {
      margin-left: 72px
    }

    .main-header {
      height: 72px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 50
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px
    }

    .menu-btn {
      background: transparent;
      border: none;
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px
    }

    .menu-btn:hover {
      color: var(--text-heading)
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -.01em
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px
    }

    .header-date {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-sub)
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden
    }

    .card-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap
    }

    .card-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark-blue)
    }

    .card-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .subtitle {
      color: var(--text-sub);
      font-size: 13px;
      margin-top: 2px;
      flex-basis: 100%
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all .18s;
      white-space: nowrap
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    .btn-primary {
      background: var(--dark-blue);
      color: #fff
    }

    .btn-primary:hover:not(:disabled) {
      background: #162D55
    }

    .btn-success {
      background: var(--success);
      color: #fff
    }

    .btn-secondary {
      background: #E2E8F0;
      color: var(--text)
    }

    .btn-secondary:hover {
      background: #CBD5E1
    }

    .btn-danger {
      background: #FEE2E2;
      color: #B91C1C;
      border: 1px solid #FECACA
    }

    .btn-danger:hover {
      background: #FECACA
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 13px
    }

    .btn-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-sub);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 14px
    }

    .btn-icon:hover {
      background: #F1F5F9;
      color: var(--text)
    }

    .btn-excel {
      background: #16A34A;
      color: #fff;
      min-width: 110px;
      justify-content: center
    }

    .btn-excel:hover:not(:disabled) {
      background: #15803D
    }

    .btn-pdf {
      background: #DC2626;
      color: #fff;
      min-width: 110px;
      justify-content: center
    }

    .btn-pdf:hover:not(:disabled) {
      background: #B91C1C
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, .4);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 0
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text)
    }

    .form-control {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
      outline: none;
      width: 100%
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12)
    }

    select.form-control {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: 36px
    }

    .generate-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      align-items: end
    }

    .generate-btn-group {
      display: flex;
      gap: 8px;
      grid-column: 1/-1;
      justify-content: flex-end;
      margin-top: 8px;
      flex-wrap: wrap
    }

    .table-wrapper {
      overflow-x: auto
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14.5px
    }

    .data-table th {
      background: var(--dark-blue);
      color: #fff;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap
    }

    .data-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap
    }

    .data-table tr:last-child td {
      border-bottom: none
    }

    .data-table tr:hover td {
      background: #F8FAFC
    }

    .nominal-cell {
      text-align: right;
      font-variant-numeric: tabular-nums
    }

    .center-cell {
      text-align: center
    }

    .empty-state {
      text-align: center;
      color: var(--text-sub);
      padding: 32px !important;
      font-style: italic
    }

    .badge {
      background: #DBEAFE;
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600
    }

    .status-open {
      background: #FFF7ED;
      color: #F59E0B;
      padding: 4px 12px;
      border-radius: 99px;
      font-weight: 600;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center
    }

    .status-lunas {
      background: #ECFDF5;
      color: #10B981;
      padding: 4px 12px;
      border-radius: 99px;
      font-weight: 600;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center
    }

    .status-close {
      color: var(--success);
      font-weight: 700
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px
    }

    .modal-box {
      background: #fff;
      border-radius: var(--radius);
      width: 100%;
      max-width: 580px;
      max-height: 90vh;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .2);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .modal-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border)
    }

    .modal-header h3 {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      color: var(--dark-blue)
    }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto
    }

    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px
    }

    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999
    }

    .toast {
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      animation: fadeIn .25s ease;
      max-width: 360px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .2)
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1
      }
    }

    .toast.success {
      background: var(--success)
    }

    .toast.error {
      background: var(--dark-red)
    }

    .toast.info {
      background: var(--accent)
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px
    }

    .req {
      color: var(--dark-red)
    }

    .umur-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-sub);
      padding: 8px 12px;
      background: #F8FAFC;
      border-radius: 6px;
      border: 1px solid var(--border)
    }

    .info-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13.5px;
      color: var(--text-sub);
      padding: 14px;
      background: #F8FAFC;
      border-radius: 8px;
      border: 1px solid var(--border)
    }

    .field-hint {
      font-size: 11px;
      color: var(--accent);
      margin-top: 4px;
      display: block;
      font-weight: 500
    }

    .input-autofilled {
      border-color: var(--accent) !important
    }

    .input-with-icon {
      position: relative;
      display: flex;
      align-items: center
    }

    .input-icon {
      position: absolute;
      left: 12px;
      color: var(--text-sub);
      pointer-events: none
    }

    .input-with-icon .form-control {
      padding-left: 36px
    }

    .card-filter {
      position: relative;
      overflow: hidden
    }

    .card-filter-bg-graphic {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 300px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden
    }

    .cfg-blob-1 {
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(129, 140, 248, .1);
      border-radius: 50%;
      top: -50px;
      right: -50px;
      filter: blur(20px)
    }

    .cfg-blob-2 {
      position: absolute;
      width: 150px;
      height: 150px;
      background: rgba(167, 139, 250, .1);
      border-radius: 50%;
      bottom: -40px;
      right: 80px;
      filter: blur(15px)
    }

    .cfg-dots {
      position: absolute;
      width: 60px;
      height: 60px;
      background-image: radial-gradient(rgba(99, 102, 241, .3) 2px, transparent 2px);
      background-size: 10px 10px;
      top: 20px;
      right: 40px
    }

    .table-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid var(--border)
    }

    .table-footer-text {
      font-size: 14px;
      color: var(--text-sub)
    }

    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .pagination-controls select {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
      margin-right: 16px
    }

    .page-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-sub);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease
    }

    .page-btn:hover {
      background: #F1F5F9;
      color: var(--text-heading)
    }

    .page-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(37, 99, 235, .3)
    }

    .empty-full {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-sub);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px
    }

    .empty-full p {
      font-size: 14px
    }

    .soa-preview-box {
      border: 1.5px solid #BFDBFE;
      border-radius: 8px;
      background: #EFF6FF;
      padding: 16px 20px
    }

    .soa-preview-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .soa-preview-content {
      background: #fff;
      border-radius: 6px;
      border: 1px solid var(--border);
      padding: 14px 18px
    }

    .soa-preview-row {
      display: flex;
      gap: 40px;
      flex-wrap: wrap
    }

    .soa-preview-left,
    .soa-preview-right {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .soa-preview-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px
    }

    .soa-key {
      color: var(--text-sub);
      min-width: 90px;
      font-weight: 500
    }

    .soa-sep {
      color: var(--text-sub)
    }

    .soa-val {
      font-weight: 600;
      color: var(--text)
    }

    .soa-val-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark-blue);
      padding: 2px 10px;
      border: 1.5px solid var(--dark-blue);
      border-radius: 4px
    }

    tfoot tr td {
      border-top: 2px solid var(--border) !important
    }

    .stock-table-wrapper {
      overflow-x: auto;
      border: 1px solid #E2E8F0;
      border-radius: 8px
    }

    .stock-table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap
    }

    .stock-table th {
      background: #E2E8F0;
      text-align: left;
      font-weight: 700;
      color: #1E293B;
      padding: .75rem 1rem;
      border-bottom: 2px solid #CBD5E1;
      text-transform: uppercase;
      font-size: .75rem;
      letter-spacing: .5px
    }

    .stock-table td {
      padding: 1rem;
      vertical-align: middle;
      border-bottom: 1px solid #E2E8F0
    }

    .link-btn {
      background: none;
      border: none;
      color: #2563EB;
      text-decoration: underline;
      cursor: pointer;
      font-size: inherit;
      font-family: inherit;
      padding: 0;
      text-align: left
    }

    .link-btn:hover {
      color: #1D4ED8
    }

    .text-blue {
      color: #2563EB
    }

    .text-green {
      color: #16A34A
    }

    .text-red {
      color: #DC2626
    }

    .text-muted {
      color: #64748B
    }

    .font-semibold {
      font-weight: 600
    }

    .font-medium {
      font-weight: 500
    }

    .text-sm {
      font-size: .875rem
    }

    .status-badge {
      display: inline-block;
      padding: .25rem .75rem;
      border-radius: 9999px;
      font-size: .75rem;
      font-weight: 600
    }

    .status-gr {
      background: #D1FAE5;
      color: #065F46
    }

    .status-partial {
      background: #FEF3C7;
      color: #92400E
    }

    .status-belum-datang {
      background: #FEE2E2;
      color: #991B1B
    }

    .detail-view-container {
      background: #FFFFFF;
      border-radius: 8px;
      padding: 2rem;

  <!-- ═══════════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════════ -->
  <script>
    'use strict';

    // ─────────────────────────────────────────────────────────────────
    //  APP STATE
    // ─────────────────────────────────────────────────────────────────
    var State = {
      activeTab: 'tagihan',
      sidebarOpen: true,
      tagihanRows: [],
      stockData: [],
      company: { name: 'PT XYZ', address: 'Jl. Merdeka No. X8, Medan', telp: '061 654 3210', logo: '' },
      // Tagihan page state
      tagihan: {
        selCustomer: '', selStatus: 'ALL', selWaktu: 'ALL',
        pageSize: 5, currentPage: 1,
        exportColumns: {
          no: true, customerId: true, namaCustomer: true, noInvoice: true, tglInvoice: true,
          jatuhTempo: true, nominal: true, termin1: true, termin2: true, termin3: true, status: true, tglClose: true, umur: true
        }
      },
      // Stock page state
      stock: {
        searchTerm: '', selectedVendor: 'Semua vendor', statusFilter: 'Semua',
        selectedProductName: null
      }
    };

    // ─────────────────────────────────────────────────────────────────
    //  TABS CONFIG
    // ─────────────────────────────────────────────────────────────────
    var TABS = [
      {
        key: 'tagihan', label: 'Data & Generate',
        icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>'
      },
      {
        key: 'rekap', label: 'Rekap Customer',
        icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>'
      },
      {
        key: 'stock', label: 'Monitoring Barang',
        icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'
      },
      {
        key: 'settings', label: 'Pengaturan',
        icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
      },
    ];

    var PAGE_TITLES = { tagihan: 'Generate Statement of Account', rekap: 'Rekap Customer', stock: 'Monitoring Barang', settings: 'Pengaturan' };

    // ─────────────────────────────────────────────────────────────────
    //  UTILITIES
    // ─────────────────────────────────────────────────────────────────
    function formatRp(num) { return new Intl.NumberFormat('id-ID').format(Math.round(num || 0)); }
    function formatNum(num) { return new Intl.NumberFormat('id-ID').format(Math.round(num || 0)); }

    function htmlDateToDisplay(val) {
      if (!val) return '';
      var p = val.split('-'); return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : val;
    }
    function displayDateToHtml(val) {
      if (!val) return '';
      var p = val.split('/');
      if (p.length !== 3) return val;
      return p[2] + '-' + p[1].padStart(2, '0') + '-' + p[0].padStart(2, '0');
    }
    function hitungUmur(jatuhTempoStr) {
      if (!jatuhTempoStr) return 0;
      try {
        var p = jatuhTempoStr.split('/');
        var tgl = new Date(+p[2], +p[1] - 1, +p[0]);
        var today = new Date(); today.setHours(0, 0, 0, 0);
        return Math.floor((tgl - today) / 86400000);
      } catch (e) { return 0; }
    }
    function parseNominalInput(str) {
      if (!str) return 0;
      return parseFloat(String(str).replace(/\./g, '').replace(',', '.')) || 0;
    }
    function escHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function getCustomers() {
      var map = new Map();
      State.tagihanRows.forEach(function (r) {
        if (r.customerId && !map.has(r.customerId)) map.set(r.customerId, r.namaCustomer || r.customerId);
      });
      return Array.from(map.entries()).map(function (e) { return { id: e[0], name: e[1] }; });
    }

    // ─────────────────────────────────────────────────────────────────
    //  TOAST
    // ─────────────────────────────────────────────────────────────────
    function showToast(msg, type) {
      type = type || 'info';
      var wrap = document.getElementById('toast-wrap');
      var el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 3500);
    }

    // ─────────────────────────────────────────────────────────────────
    //  ROUTING / NAVIGATION
    // ─────────────────────────────────────────────────────────────────
    function setTab(key) {
      State.activeTab = key;
      // Update sidebar
      document.querySelectorAll('.sidebar-tab').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.key === key);
      });
      // Update header title
      document.getElementById('header-title').textContent = PAGE_TITLES[key] || 'Dashboard';
      // Show/hide pages
      ['tagihan', 'rekap', 'stock', 'settings'].forEach(function (k) {
        var el = document.getElementById('page-' + k);
        if (el) el.style.display = (k === key ? '' : 'none');
      });
      // Render page content
      if (key === 'tagihan') renderTagihanPage();
      else if (key === 'rekap') renderRekapPage();
      else if (key === 'stock') renderStockPage();
      else if (key === 'settings') renderSettingsPage();
    }

    function renderSidebar() {
      var nav = document.getElementById('sidebar-nav');
      nav.innerHTML = TABS.map(function (t) {
        return '<button class="sidebar-tab' + (State.activeTab === t.key ? ' active' : '') + '" data-key="' + t.key + '" onclick="setTab(\'' + t.key + '\')">' +
          '<span class="sidebar-icon">' + t.icon + '</span>' +
          '<span class="sidebar-label">' + escHtml(t.label) + '</span>' +
          '</button>';
      }).join('');
    }

    // ─────────────────────────────────────────────────────────────────
    //  MODAL HELPER
    // ─────────────────────────────────────────────────────────────────
    function openModal(opts) {
      // opts: { title, bodyHtml, footerHtml, id, onClose }
      var c = document.getElementById('modal-container');
      var id = opts.id || 'modal-main';
      var footer = opts.footerHtml !== undefined ? opts.footerHtml :
        '<button class="btn btn-secondary" onclick="closeModal(\'' + id + '\')">Batal</button>' +
        '<button class="btn btn-primary" id="modal-save-btn">Simpan</button>';
      c.innerHTML =
        '<div class="modal-overlay" id="' + id + '" onclick="if(event.target===this)closeModal(\'' + id + '\')">' +
        '<div class="modal-box">' +
        '<div class="modal-header">' +
        '<h3>' + escHtml(opts.title || '') + '</h3>' +
        '<button class="btn-icon" onclick="closeModal(\'' + id + '\')">✕</button>' +
        '</div>' +
        '<div class="modal-body" id="modal-body">' + opts.bodyHtml + '</div>' +
        (footer ? '<div class="modal-footer">' + footer + '</div>' : '') +
        '</div>' +
        '</div>';
    }
    function closeModal(id) {
      var c = document.getElementById('modal-container');
      if (id) { var el = document.getElementById(id); if (el) el.remove(); }
      else c.innerHTML = '';
    }

    // ─────────────────────────────────────────────────────────────────
    //  BACKEND COMMUNICATION (google.script.run wrapper)
    // ─────────────────────────────────────────────────────────────────
    var _isMock = typeof google === 'undefined';

    function runServer(fn, args, onSuccess, onError) {
      if (_isMock) {
        // In dev/preview mode — use localStorage
        onSuccess(mockServer(fn, args));
        return;
      }
      var call = google.script.run.withSuccessHandler(onSuccess).withFailureHandler(function (e) {
        console.error(e);
        if (onError) onError(e); else showToast('Error: ' + e.message, 'error');
      });
      call[fn].apply(call, args || []);
    }

    // Mock server for local testing (localStorage-based)
    function mockServer(fn, args) {
      var LS_TAGIHAN = 'soa_tagihan', LS_STOCK = 'soa_stock', LS_SETTINGS = 'soa_company';
      if (fn === 'getTagihanRows') return JSON.parse(localStorage.getItem(LS_TAGIHAN) || '[]');
      if (fn === 'saveTagihanRows') { localStorage.setItem(LS_TAGIHAN, JSON.stringify(args[0])); return true; }
      if (fn === 'getStockData') return JSON.parse(localStorage.getItem(LS_STOCK) || '[]');
      if (fn === 'saveStockData') { localStorage.setItem(LS_STOCK, JSON.stringify(args[0])); return true; }
      if (fn === 'getSettings') return JSON.parse(localStorage.getItem(LS_SETTINGS) || 'null') || { name: 'PT XYZ', address: 'Jl. Merdeka No. X8, Medan', telp: '061 654 3210', logo: '' };
      if (fn === 'saveSettings') { localStorage.setItem(LS_SETTINGS, JSON.stringify(args[0])); return true; }
      if (fn === 'initSheets') return true;
      return null;
    }

    // ─────────────────────────────────────────────────────────────────
    //  DATA PERSISTENCE
    // ─────────────────────────────────────────────────────────────────
    function persistTagihan() {
      runServer('saveTagihanRows', [State.tagihanRows], function () { }, function (e) { console.error('Save tagihan failed', e); });
    }
    function persistStock() {
      runServer('saveStockData', [State.stockData], function () { }, function (e) { console.error('Save stock failed', e); });
    }
    function persistSettings() {
      runServer('saveSettings', [State.company], function () { }, function (e) { console.error('Save settings failed', e); });
    }

    // ─────────────────────────────────────────────────────────────────
    //  TERBILANG
    // ─────────────────────────────────────────────────────────────────
    var _satuan = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan', 'sepuluh', 'sebelas', 'dua belas', 'tiga belas', 'empat belas', 'lima belas', 'enam belas', 'tujuh belas', 'delapan belas', 'sembilan belas'];
    var _puluhan = ['', '', 'dua puluh', 'tiga puluh', 'empat puluh', 'lima puluh', 'enam puluh', 'tujuh puluh', 'delapan puluh', 'sembilan puluh'];
    function _convertNum(n) {
      if (n < 20) return _satuan[n];
      if (n < 100) return _puluhan[Math.floor(n / 10)] + (n % 10 ? ' ' + _satuan[n % 10] : '');
      if (n < 200) return 'seratus' + (n % 100 ? ' ' + _convertNum(n % 100) : '');
      if (n < 1000) return _satuan[Math.floor(n / 100)] + ' ratus' + (n % 100 ? ' ' + _convertNum(n % 100) : '');
      if (n < 2000) return 'seribu' + (n % 1000 ? ' ' + _convertNum(n % 1000) : '');
      if (n < 1e6) return _convertNum(Math.floor(n / 1000)) + ' ribu' + (n % 1000 ? ' ' + _convertNum(n % 1000) : '');
      if (n < 1e9) return _convertNum(Math.floor(n / 1e6)) + ' juta' + (n % 1e6 ? ' ' + _convertNum(n % 1e6) : '');
      if (n < 1e12) return _convertNum(Math.floor(n / 1e9)) + ' miliar' + (n % 1e9 ? ' ' + _convertNum(n % 1e9) : '');
      return _convertNum(Math.floor(n / 1e12)) + ' triliun' + (n % 1e12 ? ' ' + _convertNum(n % 1e12) : '');
    }
    function terbilang(angka) {
      angka = Math.round(Math.abs(angka));
      if (angka === 0) return 'Nol';
      return _convertNum(angka).split(' ').map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ') + ' Rupiah';
    }

    // ─────────────────────────────────────────────────────────────────
    //  PARSE EXCEL (SheetJS)
    // ─────────────────────────────────────────────────────────────────
    function parseExcelFile(file, callback) {
      var reader = new FileReader();
      reader.onload = function (e) {
        try {
          var data = new Uint8Array(e.target.result);
          var wb = XLSX.read(data, { type: 'array', raw: true, cellDates: false });
          var sheet = wb.Sheets[wb.SheetNames[0]];
          var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: '' });
          var headerRow = 3;
          for (var i = 0; i < Math.min(rows.length, 10); i++) {
            if (rows[i].map(String).join('|').toLowerCase().includes('invoice')) { headerRow = i; break; }
          }
          var result = [];
          for (var j = headerRow + 1; j < rows.length; j++) {
            var r = rows[j];
            if (!r || r.length === 0) continue;
            var noVal = r[0];
            if (noVal === '' || noVal === null || noVal === undefined) continue;
            var noNum = typeof noVal === 'number' ? noVal : Number(String(noVal).trim());
            if (isNaN(noNum) || noNum <= 0) continue;
            result.push({
              no: noNum, customerId: String(r[1] || '').trim(), namaCustomer: String(r[2] || '').trim(),
              noInvoice: String(r[3] || '').trim(), tglInvoice: _excelDate(r[4]), jatuhTempo: _excelDate(r[5]),
              nominal: _parseNominal(r[6]), status: String(r[7] || '').trim().toUpperCase(),
              tglClose: _excelDate(r[8]), umur: _parseUmur(r[9]),
              termin1: 0, termin2: 0, termin3: 0, baseNominal: _parseNominal(r[6])
            });
          }
          callback(null, result);
        } catch (err) { callback(err); }
      };
      reader.onerror = function (err) { callback(err); };
      reader.readAsArrayBuffer(file);
    }
    function _excelDate(val) {
      if (val === '' || val === null || val === undefined) return '';
      if (typeof val === 'string') {
        var s = val.trim(); if (!s) return '';
        if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(s)) {
          var p = s.split('/'); var y = p[2].length === 2 ? '20' + p[2] : p[2];
          return p[0].padStart(2, '0') + '/' + p[1].padStart(2, '0') + '/' + y;
        }
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) { var q = s.split('-'); return q[2] + '/' + q[1] + '/' + q[0]; }
        return s;
      }
      if (typeof val === 'number') {
        var d = XLSX.SSF.parse_date_code(val);
        if (d) return String(d.d).padStart(2, '0') + '/' + String(d.m).padStart(2, '0') + '/' + d.y;
      }
      if (val instanceof Date) {
        return String(val.getDate()).padStart(2, '0') + '/' + (val.getMonth() + 1).toString().padStart(2, '0') + '/' + val.getFullYear();
      }
      return String(val).trim();
    }
    function _parseNominal(val) {
      if (val === '' || val === null || val === undefined) return 0;
      if (typeof val === 'number') return Math.round(val);
      var s = String(val).trim(); if (!s) return 0;
      var hasDot = s.includes('.'), hasComma = s.includes(','), cleaned;
      if (hasDot && hasComma) {
        cleaned = s.lastIndexOf('.') > s.lastIndexOf(',') ? s.replace(/,/g, '') : s.replace(/\./g, '').replace(',', '.');
      } else if (hasDot && !hasComma) {
        var parts = s.split('.');
        cleaned = (parts.length > 2 || (parts[parts.length - 1].length === 3)) ? s.replace(/\./g, '') : s;
      } else if (!hasDot && hasComma) {
        var cparts = s.split(',');
        cleaned = (cparts.length > 2 || (cparts[cparts.length - 1].length === 3)) ? s.replace(/,/g, '') : s.replace(',', '.');
      } else { cleaned = s.replace(/[^0-9]/g, ''); }
      return parseFloat(cleaned) || 0;
    }
    function _parseUmur(val) {
      if (val === '' || val === null || val === undefined) return 0;
      if (typeof val === 'number') return Math.round(val);
      var n = Number(String(val).replace(/[^0-9-]/g, ''));
      return isNaN(n) ? 0 : n;
    }

    function tagihanHandleImport(input) {
      var file = input.files[0]; if (!file) return;
      input.value = '';
      parseExcelFile(file, function (err, rows) {
        if (err) { showToast('Gagal baca file: ' + err.message, 'error'); return; }
        if (!rows.length) { showToast('Tidak ada data ditemukan.', 'error'); return; }
        var existing = new Set(State.tagihanRows.map(function (r) { return r.noInvoice; }));
        var newRows = rows.filter(function (r) { return !existing.has(r.noInvoice); });
        var skip = rows.length - newRows.length;
        if (!newRows.length) { showToast('Semua ' + rows.length + ' data sudah ada.', 'info'); return; }
        var merged = State.tagihanRows.concat(newRows).map(function (r, i) { return Object.assign({}, r, { no: i + 1 }); });
        State.tagihanRows = merged;
        persistTagihan();
        var uniq = new Set(newRows.map(function (r) { return r.customerId; })).size;
        showToast(skip > 0 ? newRows.length + ' data ditambahkan (' + uniq + ' customer). ' + skip + ' dilewati.' : newRows.length + ' data berhasil diimport (' + uniq + ' customer).', 'success');
        renderTagihanPage();
      });
    }

    function tagihanUpdateUmur() {
      var jt = htmlDateToDisplay(document.getElementById('tf-jatuh-tempo').value);

      _tagihanForm.umur = String(hitungUmur(jt));

    }

      _tagihanForm.status = val;

      tagihanShowForm();

    function _rawNum(str) { return str ? str.replace(/\./g, '').replace(',', '') : '0'; }
    function tagihanBaseNominalChange(val) {
      var raw = val.replace(/[^0-9]/g, '');
      var bNom = Number(raw) || 0;
      var t1 = Number(_tagihanForm.termin1) || 0, t2 = Number(_tagihanForm.termin2) || 0, t3 = Number(_tagihanForm.termin3) || 0;
      _tagihanForm.baseNominal = raw;
      _tagihanForm.nominal = String(Math.max(0, bNom - (t1 + t2 + t3)));
      var nomEl = document.getElementById('tf-nominal');
      if (nomEl) nomEl.value = Number(_tagihanForm.nominal).toLocaleString('id-ID');
    }
    function tagihanTerminChange(val, n) {
      var raw = val.replace(/[^0-9]/g, '');
      _tagihanForm['termin' + n] = raw;
      var bNom = Number(_tagihanForm.baseNominal) || 0;
      var t1 = Number(_tagihanForm.termin1) || 0, t2 = Number(_tagihanForm.termin2) || 0, t3 = Number(_tagihanForm.termin3) || 0;
      _tagihanForm.nominal = String(Math.max(0, bNom - (t1 + t2 + t3)));
      var nomEl = document.getElementById('tf-nominal');
      if (nomEl) nomEl.value = Number(_tagihanForm.nominal).toLocaleString('id-ID');
    }
    function tagihanNominalChange(val) { _tagihanForm.nominal = val.replace(/[^0-9]/g, ''); }

    function tagihanSave() {
      var f = _tagihanForm;
      var custId = (document.getElementById('tf-cust-id') || document.getElementById('tf-cust-sel') || {}).value || f.customerId;
      if (document.getElementById('tf-cust-sel')) custId = document.getElementById('tf-cust-sel').value === '__new__' ? (document.getElementById('tf-cust-id') || { value: f.customerId }).value : document.getElementById('tf-cust-sel').value;
      var custNama = (document.getElementById('tf-cust-nama') || { value: f.namaCustomer }).value;
      var noInvoice = (document.getElementById('tf-no-invoice') || { value: f.noInvoice }).value;
      var tglInvoice = (document.getElementById('tf-tgl-invoice') || { value: f.tglInvoice }).value;
      var jatuhTempo = (document.getElementById('tf-jatuh-tempo') || { value: f.jatuhTempo }).value;
      var nominal = _tagihanForm.nominal || '0';
      var status = (document.getElementById('tf-status') || { value: f.status }).value;
      var tglClose = (document.getElementById('tf-tgl-close') || { value: f.tglClose }).value;
      if (!custId.trim()) { showToast('Customer ID wajib diisi.', 'error'); return; }
      if (!custNama.trim()) { showToast('Nama Customer wajib diisi.', 'error'); return; }
      if (!noInvoice.trim()) { showToast('No Invoice wajib diisi.', 'error'); return; }
      if (!tglInvoice) { showToast('Tgl Invoice wajib diisi.', 'error'); return; }
      if (!jatuhTempo) { showToast('Jatuh Tempo wajib diisi.', 'error'); return; }
      if (!nominal || nominal === '0') { showToast('Nominal wajib diisi.', 'error'); return; }
      var row = {
        customerId: custId.trim(), namaCustomer: custNama.trim(), noInvoice: noInvoice.trim(),
        tglInvoice: htmlDateToDisplay(tglInvoice), jatuhTempo: htmlDateToDisplay(jatuhTempo),
        nominal: parseNominalInput(nominal), status: status,
        tglClose: status === 'CLOSE' ? htmlDateToDisplay(tglClose) : '',
        umur: status === 'CLOSE' ? 0 : hitungUmur(htmlDateToDisplay(jatuhTempo)),
        termin1: Number(_tagihanForm.termin1) || 0, termin2: Number(_tagihanForm.termin2) || 0, termin3: Number(_tagihanForm.termin3) || 0,
        baseNominal: Number(_tagihanForm.baseNominal) || parseNominalInput(nominal)
      };
      if (_tagihanEditIdx !== null) {
        State.tagihanRows[_tagihanEditIdx] = Object.assign({}, State.tagihanRows[_tagihanEditIdx], row);
        showToast('Data diupdate!', 'success');
      } else {
        row.no = State.tagihanRows.length + 1;
        State.tagihanRows.push(row);
        showToast('Data disimpan!', 'success');
      }
      persistTagihan();
      closeModal('modal-main');
      renderTagihanPage();
    }

    function customerSaveEdit() {
      var newId = (document.getElementById('m-cust-id').value || '').trim();
      var newName = (document.getElementById('m-cust-name').value || '').trim();
      if (!newId || !newName) return showToast('ID dan Nama tidak boleh kosong', 'error');

      var oldId = _editCustomerState.oldId;
      var oldName = _editCustomerState.oldName;
      if (oldId === newId && oldName === newName) return closeModal('modal-main');

      // Optimistic UI update
      var countChanged = 0;
      State.tagihanRows.forEach(function (r) {
        if (r.customerId === oldId) {
          r.customerId = newId;
          r.namaCustomer = newName;
          countChanged++;
        }
      });

      closeModal('modal-main');
      renderRekapCustomer(); // update table
      showToast('Menyimpan perubahan untuk ' + countChanged + ' tagihan...', 'success');

      // Kirim ke server
      runServer('updateCustomerMaster', [oldId, newId, newName], function (success) {
        if (success) {
          showToast('Master Customer berhasil diperbarui', 'success');
        } else {
          showToast('Gagal memperbarui di server, muat ulang halaman...', 'error');
          setTimeout(function () { location.reload(); }, 2000);
        }
      });
    }

    function renderStockDetail(el) {

      var data = State.stockData.filter(function (d) { return d.namaBarang === productName; });
      var totalOrder = data.reduce(function (a, c) { return a + c.order; }, 0);
      var totalTransit = data.reduce(function (a, c) { return a + c.transit; }, 0);
      var totalDatang = data.reduce(function (a, c) { return a + c.datang; }, 0);
      var totalSisa = data.reduce(function (a, c) { return a + c.sisa; }, 0);
      el.innerHTML =
        '<div class="detail-view-container">' +
        '<div class="detail-header-row">' +
        '<div>' +
        '<button class="back-btn text-muted" onclick="State.stock.selectedProductName=null;renderStockPage()">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>Kembali' +
        '</button>' +
        '<div class="text-sm text-muted uppercase mt-2 font-semibold">Report Produk</div>' +
        '<h2 class="detail-title">' + escHtml(productName) + '</h2>' +
        '</div>' +
        '<button class="export-btn" onclick="generateStockPDF(\'' + escHtml(productName) + '\',State.stockData.filter(function(d){return d.namaBarang===\'' + escHtml(productName) + '\';}).map(function(d){return d;}),_stockExpandedPOs)">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>Export PDF' +
        '</button>' +
        '</div>' +
        '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-label">Total Order</div><div class="stat-value">' + formatNum(totalOrder) + '</div><div class="stat-desc">dari ' + data.length + ' PO</div></div>' +
        '<div class="stat-card"><div class="stat-label">Total Transit</div><div class="stat-value text-blue">' + formatNum(totalTransit) + '</div><div class="stat-desc text-muted">di MKR</div></div>' +
        '<div class="stat-card"><div class="stat-label">Total Datang</div><div class="stat-value text-green">' + formatNum(totalDatang) + '</div><div class="stat-desc text-muted">sudah sampai</div></div>' +
        '<div class="stat-card"><div class="stat-label">Total Sisa</div><div class="stat-value text-red">' + formatNum(totalSisa) + '</div><div class="stat-desc text-muted">belum datang</div></div>' +
        '</div>' +
        '<h3 class="history-title">Riwayat per PO</h3>' +
        '<div class="po-history-list" id="po-history-list">' +
        data.map(function (po) {
          var isExp = !!_stockExpandedPOs[po.id];
          var statusClass = po.status === 'GR' ? 'status-gr' : po.status === 'Partial' ? 'status-partial' : 'status-belum-datang';
          return '<div class="po-card">' +
            '<div class="po-card-header" onclick="stockTogglePO(' + po.id + ')">' +
            '<div class="flex-align-center gap-2"><h4 class="po-card-title">PO ' + escHtml(po.noPo) + ' <span style="font-weight:400;margin:0 4px">|</span> ' + escHtml(po.vendor) + '</h4></div>' +
            '<div style="display:flex;align-items:center;gap:8px"><span class="status-badge ' + statusClass + '">' + (po.status === 'GR' ? 'Goods Receipt' : escHtml(po.status)) + '</span></div>' +
            '</div>' +
            '<div class="po-card-body" style="display:' + (isExp ? 'block' : 'none') + '">' +
            '<table class="history-table"><thead><tr><th>No GR</th><th>Tanggal</th><th>Transit MKR</th><th>Datang</th><th>PIC</th><th>Keterangan</th></tr></thead>' +
            '<tbody>' +
            (po.history || []).map(function (h) {
              return '<tr><td class="font-medium text-dark">' + escHtml(h.noGr) + '</td><td>' + escHtml(h.tanggal) + '</td><td class="text-blue">' + formatNum(h.transit) + '</td><td class="text-green">' + formatNum(h.datang) + '</td><td>' + escHtml(h.pic) + '</td><td class="text-muted">' + escHtml(h.keterangan) + '</td></tr>';
            }).join('') +
            '</tbody></table>' +
            '<div class="po-card-footer text-sm"><span class="font-medium">Order ' + formatNum(po.order) + '</span> <span style="margin:0 6px;color:#CBD5E1">|</span> <span class="font-medium">Datang ' + formatNum(po.datang) + '</span> <span style="margin:0 6px;color:#CBD5E1">|</span> <span class="font-medium">Sisa ' + formatNum(po.sisa) + '</span></div>' +
            '</div>' +
            '</div>';
        }).join('') +
        '</div>' +
        '</div>';
    }

    function stockTogglePO(id) {
      _stockExpandedPOs[id] = !_stockExpandedPOs[id];
      if (State.stock.selectedProductName) renderStockPage();
    }

    // Stock Form
    var _stockForm = {};
    var _stockEditId = null;

    function emptyStockForm() {
      return { tanggal: new Date().toISOString().split('T')[0], namaBarang: '', vendor: '', noPo: '', order: '', transit: '', datang: '', status: 'Belum datang', noGr: '', pic: '', keterangan: '' };
    }

    function stockOpenAdd() {
      _stockForm = emptyStockForm(); _stockEditId = null; stockShowForm();
    }
    function stockOpenEdit(id) {
      var item = State.stockData.find(function (i) { return i.id === id; });
      if (!item) return;
      _stockForm = {
        tanggal: new Date().toISOString().split('T')[0],
        namaBarang: item.namaBarang, vendor: item.vendor, noPo: item.noPo,
        order: item.order, transit: item.transit, datang: item.datang,
        status: item.status, noGr: item.noGr || '', pic: item.pic || '', keterangan: item.keterangan || ''
      };
      _stockEditId = id; stockShowForm();
    }
    function stockShowForm() {
      var f = _stockForm;
      var sisa = (Number(f.order) || 0) - (Number(f.datang) || 0);
      openModal({
        title: (_stockEditId ? 'Edit' : 'Tambah') + ' Data Stok Baru',
        bodyHtml:
          '<div class="form-grid-2">' +
          '<div class="form-group"><label>Tanggal <span class="req">*</span></label><input required type="date" class="form-control" id="sf-tanggal" value="' + escHtml(f.tanggal) + '"></div>' +
          '<div class="form-group"><label>Nama Barang <span class="req">*</span></label><input required type="text" class="form-control" id="sf-nama" placeholder="Contoh: Kertas Label Thermal" value="' + escHtml(f.namaBarang) + '"></div>' +
          '</div>' +
          '<div class="form-grid-2">' +
          '<div class="form-group"><label>Vendor <span class="req">*</span></label><input required type="text" class="form-control" id="sf-vendor" placeholder="Contoh: PT abcdefg" value="' + escHtml(f.vendor) + '"></div>' +
          '<div class="form-group"><label>No PO <span class="req">*</span></label><input required type="text" class="form-control" id="sf-nopo" placeholder="Contoh: 4500001613" value="' + escHtml(f.noPo) + '"></div>' +
          '</div>' +
          '<div style="padding:16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;margin-bottom:16px">' +
          '<div class="form-grid-2" style="margin-bottom:16px">' +
          '<div class="form-group"><label>Order (Qty) <span class="req">*</span></label><input required type="number" class="form-control" id="sf-order" placeholder="0" value="' + escHtml(String(f.order)) + '" oninput="stockUpdateSisa()"></div>' +
          '<div class="form-group"><label>Transit (Qty)</label><input type="number" class="form-control" id="sf-transit" placeholder="0" value="' + escHtml(String(f.transit)) + '"></div>' +
          '</div>' +
          '<div class="form-grid-2">' +
          '<div class="form-group"><label>Datang (Qty)</label><input type="number" class="form-control" id="sf-datang" placeholder="0" value="' + escHtml(String(f.datang)) + '" oninput="stockUpdateSisa()"></div>' +
          '<div class="form-group"><label>Sisa (Qty)</label><input type="number" class="form-control" id="sf-sisa" disabled value="' + sisa + '" style="font-weight:600;color:var(--dark-red);background:#FEF2F2"></div>' +
          '</div>' +
          '</div>' +
          '<div class="form-grid-2">' +
          '<div class="form-group"><label>Status <span class="req">*</span></label><select class="form-control" id="sf-status"><option value="Belum datang"' + (f.status === 'Belum datang' ? ' selected' : '') + '>Belum datang</option><option value="Partial"' + (f.status === 'Partial' ? ' selected' : '') + '>Partial</option><option value="GR"' + (f.status === 'GR' ? ' selected' : '') + '>GR</option></select></div>' +
          '<div class="form-group"><label>No GR</label><input type="text" class="form-control" id="sf-nogr" placeholder="Contoh: 50001234" value="' + escHtml(f.noGr) + '"></div>' +
          '</div>' +
          '<div class="form-grid-2">' +
          '<div class="form-group"><label>PIC</label><input type="text" class="form-control" id="sf-pic" placeholder="Nama PIC" value="' + escHtml(f.pic) + '"></div>' +
          '<div class="form-group"><label>Keterangan</label><input type="text" class="form-control" id="sf-ket" placeholder="Contoh: sudah tiba manado" value="' + escHtml(f.keterangan) + '"></div>' +
          '</div>',
        footerHtml: '<button class="btn btn-secondary" onclick="closeModal(\'modal-main\')">Batal</button><button class="btn btn-primary" onclick="stockSave()">Simpan</button>'
      });
    }
    function stockUpdateSisa() {
      var order = Number((document.getElementById('sf-order') || { value: '0' }).value) || 0;
      var datang = Number((document.getElementById('sf-datang') || { value: '0' }).value) || 0;
      var sisaEl = document.getElementById('sf-sisa');
      if (sisaEl) sisaEl.value = Math.max(0, order - datang);
    }
    function stockSave() {
      var nama = (document.getElementById('sf-nama') || { value: '' }).value;
      var vendor = (document.getElementById('sf-vendor') || { value: '' }).value;
      var noPo = (document.getElementById('sf-nopo') || { value: '' }).value;
      var order = Number((document.getElementById('sf-order') || { value: '0' }).value) || 0;
      var transit = Number((document.getElementById('sf-transit') || { value: '0' }).value) || 0;
      var datang = Number((document.getElementById('sf-datang') || { value: '0' }).value) || 0;
      var status = (document.getElementById('sf-status') || { value: 'Belum datang' }).value;
      var noGr = (document.getElementById('sf-nogr') || { value: '' }).value;
      var pic = (document.getElementById('sf-pic') || { value: '' }).value;
      var keterangan = (document.getElementById('sf-ket') || { value: '' }).value;
      var tanggal = (document.getElementById('sf-tanggal') || { value: '' }).value;
      if (!nama.trim()) { showToast('Nama Barang wajib diisi.', 'error'); return; }
      if (!vendor.trim()) { showToast('Vendor wajib diisi.', 'error'); return; }
      var sisa = Math.max(0, order - datang);
      if (_stockEditId) {
        var idx = State.stockData.findIndex(function (i) { return i.id === _stockEditId; });
        if (idx !== -1) {
          State.stockData[idx] = Object.assign({}, State.stockData[idx], { namaBarang: nama, vendor: vendor, noPo: noPo, order: order, transit: transit, datang: datang, sisa: sisa, status: status, noGr: noGr, pic: pic, keterangan: keterangan });
          showToast('Data stok diupdate!', 'success');
        }
      } else {
        var tanggalStr = htmlDateToDisplay(tanggal);
        State.stockData.push({
          id: Date.now(), namaBarang: nama, vendor: vendor, noPo: noPo, order: order, transit: transit, datang: datang, sisa: sisa,
          status: status, noGr: noGr, pic: pic, keterangan: keterangan,
          history: [{ noGr: noGr || '-', tanggal: tanggalStr, transit: transit, datang: datang, pic: pic || '-', keterangan: keterangan }]
        });
        showToast('Data stok ditambahkan!', 'success');
      }
      persistStock();
      closeModal('modal-main');
      renderStockPage();
    }
    function stockDelete(id) {
      if (!confirm('Hapus data stok ini?')) return;
      State.stockData = State.stockData.filter(function (i) { return i.id !== id; });
      persistStock();
      showToast('Data stok dihapus.', 'info');
      renderStockPage();
    }

    // ─────────────────────────────────────────────────────────────────
    //  SETTINGS PAGE
    // ─────────────────────────────────────────────────────────────────
    function renderSettingsPage() {
      var el = document.getElementById('page-settings');
      var c = State.company;
      el.innerHTML =
        '<div style="max-width:1024px;margin:0 auto;padding-bottom:40px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding:16px 20px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid var(--border)">' +
        '<div>' +
        '<h2 style="margin:0;font-size:18px;color:var(--dark-blue)">Pengaturan Sistem</h2>' +
        '<span class="subtitle" style="font-size:13px;margin-top:4px;display:block">Kelola profil perusahaan untuk kop surat di PDF &amp; Excel.</span>' +
        '</div>' +
        '<button class="btn btn-primary" onclick="settingsSave()" style="display:flex;align-items:center;gap:8px;padding:10px 20px">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>' +
        'Simpan Semua' +
        '</button>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">' +
        '<div class="card" style="box-shadow:0 1px 3px rgba(0,0,0,.04);margin:0">' +
        '<div class="card-header" style="padding-bottom:16px;border-bottom:1px solid var(--border)">' +
        '<h3 style="margin:0;font-size:16px;color:var(--dark-blue);display:flex;align-items:center;gap:8px">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>' +
        'Informasi Perusahaan (Kop Surat)' +
        '</h3>' +
        '</div>' +
        '<div class="card-body" style="display:flex;flex-direction:column;gap:20px">' +
        '<div style="display:flex;flex-direction:column;gap:16px">' +
        '<div class="form-group" style="margin-bottom:0"><label style="font-size:13px">Nama Perusahaan</label><input class="form-control" id="set-name" placeholder="PT XYZ" value="' + escHtml(c.name || '') + '"></div>' +
        '<div class="form-group" style="margin-bottom:0"><label style="font-size:13px">Alamat</label><input class="form-control" id="set-address" placeholder="Jl. Merdeka No. X8, Medan" value="' + escHtml(c.address || '') + '"></div>' +
        '<div class="form-group" style="margin-bottom:0"><label style="font-size:13px">Nomor Telepon</label><input class="form-control" id="set-telp" placeholder="061 654 3210" value="' + escHtml(c.telp || '') + '"></div>' +
        '</div>' +
        '<div class="form-group" style="margin-bottom:0">' +
        '<label style="font-size:13px">Logo Perusahaan (Opsional)</label>' +
        '<div id="logo-drop-area" style="border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;background:#F8FAFC;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;cursor:pointer" onclick="document.getElementById(\'set-logo-input\').click()">' +
        (c.logo ?
          '<img src="' + c.logo + '" alt="Logo" style="max-height:60px;object-fit:contain"><button class="btn btn-sm" style="background:#FEE2E2;color:var(--dark-red)" onclick="event.stopPropagation();settingsRemoveLogo()">Hapus Logo</button>' :
          '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>' +
          '<span style="font-size:13px;color:#64748B">Pilih gambar logo untuk kop surat</span>'
        ) +
        '<input id="set-logo-input" type="file" accept="image/*" style="display:none" onchange="settingsLogoChange(this)">' +
        '</div>' +
        '</div>' +
        '<div>' +
        '<label style="font-size:13px;display:block;margin-bottom:8px">Preview Header di PDF &amp; Excel</label>' +
        '<div style="padding:16px;background:#F8FAFC;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-sub)">' +
        '<div style="text-align:center;margin-bottom:8px">' +
        (c.logo ? '<img src="' + c.logo + '" alt="Logo" style="max-height:50px;object-fit:contain;margin-bottom:8px"><br>' : '') +
        '<div style="font-weight:700;font-size:16px;color:var(--dark-blue)">STATEMENT OF ACCOUNT</div>' +
        '</div>' +
        '<div style="text-align:center">' + escHtml(c.name || 'PT XYZ') + '  |  ' + escHtml(c.address || 'Alamat') + '  |  Telp ' + escHtml(c.telp || '-') + '</div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>';
    }
    function settingsSave() {
      var name = (document.getElementById('set-name') || { value: '' }).value;
      if (!name.trim()) { showToast('Nama perusahaan tidak boleh kosong.', 'error'); return; }
      State.company.name = name.trim();
      State.company.address = (document.getElementById('set-address') || { value: '' }).value.trim();
      State.company.telp = (document.getElementById('set-telp') || { value: '' }).value.trim();
      persistSettings();
      showToast('Pengaturan berhasil disimpan!', 'success');
      renderSettingsPage();
    }
    function settingsRemoveLogo() { State.company.logo = ''; renderSettingsPage(); }
    function settingsLogoChange(input) {
      var file = input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onloadend = function () { State.company.logo = reader.result; renderSettingsPage(); };
      reader.readAsDataURL(file);
    }

    // ─────────────────────────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────────────────────────
    function initApp() {
      // Header date
      var dateStr = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('header-date').textContent = dateStr;

      // Sidebar toggle
      document.getElementById('menu-toggle').addEventListener('click', function () {
        State.sidebarOpen = !State.sidebarOpen;
        document.querySelector('.app-layout').classList.toggle('sidebar-closed', !State.sidebarOpen);
      });

      // Load data from server
      var loaded = 0;
      function checkLoaded() {
        loaded++;
        if (loaded >= 3) {
          // Tidak ada data contoh (dummy) lagi. Jika kosong, biarkan kosong.
          renderSidebar();
          setTab('tagihan');
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById('app').style.display = '';
        }
      }

      runServer('getTagihanRows', [], function (rows) {
        State.tagihanRows = rows || [];
        checkLoaded();
      });
      runServer('getStockData', [], function (data) {
        if (data && data.length > 0) State.stockData = data;
        checkLoaded();
      });
      runServer('getSettings', [], function (settings) {
        if (settings) State.company = settings;
        checkLoaded();
      });
      runServer('initSheets', [], function () { }, function () { });
    }

    window.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
